<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHome Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: white; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #333; }
        .header h1 { font-size: 24px; }
        .status { display: flex; gap: 20px; }
        .status-item { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-green { background: #34C759; box-shadow: 0 0 8px #34C759; }
        .dot-red { background: #FF3B30; }
        
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #1C1C1E; border-radius: 12px; padding: 20px; border: 1px solid #2C2C2E; }
        .card h2 { font-size: 18px; margin-bottom: 15px; color: #8E8E93; }
        
        .room-list { display: flex; flex-direction: column; gap: 10px; }
        .room-item { display: flex; justify-content: space-between; padding: 10px; background: #2C2C2E; border-radius: 8px; }
        .room-name { font-weight: 600; }
        .room-count { color: #34C759; font-weight: bold; }
        
        .metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .metric { text-align: center; padding: 15px; background: #2C2C2E; border-radius: 8px; }
        .metric-value { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .metric-label { font-size: 12px; color: #8E8E93; }
        
        .timeline { margin-top: 20px; }
        .timeline-item { padding: 10px; border-left: 3px solid #007AFF; margin-bottom: 10px; background: #2C2C2E; }
        
        #data { margin-top: 30px; padding: 20px; background: #1C1C1E; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SafeHome <span style="color: #007AFF;">Dashboard</span></h1>
            <div class="status">
                <div class="status-item">
                    <div class="status-dot dot-green"></div>
                    <span>MQTT Aktif</span>
                </div>
                <div class="status-item">
                    <div class="status-dot dot-green"></div>
                    <span>ESP32 Bağlı</span>
                </div>
            </div>
        </div>
        
        <div class="cards">
            <div class="card">
                <h2>📡 Oda Durumları</h2>
                <div class="room-list" id="rooms">
                    <!-- JavaScript ile dolacak -->
                </div>
            </div>
            
            <div class="card">
                <h2>📊 CSI Metrikleri</h2>
                <div class="metrics" id="metrics">
                    <!-- JavaScript ile dolacak -->
                </div>
            </div>
            
            <div class="card">
                <h2>🕐 Son Hareketler</h2>
                <div class="timeline" id="timeline">
                    <!-- JavaScript ile dolacak -->
                </div>
            </div>
        </div>
        
        <div id="data">
            <h2>📡 Real-time MQTT Verisi</h2>
            <pre id="mqtt-data" style="background: #000; padding: 10px; border-radius: 8px; overflow: auto; max-height: 300px;"></pre>
        </div>
    </div>
    
    <script>
        // WebSocket bağlantısı
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        
        ws.onopen = () => {
            console.log('WebSocket bağlantısı kuruldu');
            document.getElementById('mqtt-data').textContent += 'WebSocket bağlantısı kuruldu\n';
        };
        
        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                updateDashboard(data);
                document.getElementById('mqtt-data').textContent += JSON.stringify(data, null, 2) + '\n';
            } catch (e) {
                console.log('Raw message:', event.data);
            }
        };
        
        function updateDashboard(data) {
            // Oda durumlarını güncelle
            if (data.type === 'zones') {
                const roomsDiv = document.getElementById('rooms');
                roomsDiv.innerHTML = '';
                data.zones.forEach(zone => {
                    const room = document.createElement('div');
                    room.className = 'room-item';
                    room.innerHTML = `
                        <span class="room-name">${zone.name} ${zone.icon}</span>
                        <span class="room-count">${zone.occupancy.count} kişi</span>
                    `;
                    roomsDiv.appendChild(room);
                });
            }
            
            // Metrikleri güncelle
            if (data.type === 'metrics') {
                const metricsDiv = document.getElementById('metrics');
                metricsDiv.innerHTML = '';
                Object.entries(data.metrics).forEach(([key, value]) => {
                    const metric = document.createElement('div');
                    metric.className = 'metric';
                    metric.innerHTML = `
                        <div class="metric-value">${value}</div>
                        <div class="metric-label">${key}</div>
                    `;
                    metricsDiv.appendChild(metric);
                });
            }
        }
        
        // İlk veriyi al
        fetch('/api/v1/zones')
            .then(res => res.json())
            .then(data => {
                updateDashboard({ type: 'zones', zones: data.zones });
            });
    </script>
</body>
</html>
