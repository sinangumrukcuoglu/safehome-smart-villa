; PlatformIO Project Configuration File for ESP32-S3
; XIAO ESP32-S3 için ESP32-S3 Dev Module kullan
[env:esp32-s3-dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; XIAO ESP32-S3 pin mapping
board_build.flash_mode = dio
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv

; Build flags for WiFi CSI
build_flags = 
    -DCONFIG_ESP_WIFI_CSI_ENABLED=y
    -DCONFIG_ESP_WIFI_MGMT_SBUF_NUM=32
    -DCONFIG_ESP_WIFI_AMPDU_ENABLED=y
    -DCONFIG_ESP32_REV_MIN_3=y
    -DCONFIG_ESP32S3_DEFAULT_CPU_FREQ_240=y

; Monitor configuration
monitor_rts = 0
monitor_dtr = 0